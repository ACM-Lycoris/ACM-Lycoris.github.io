<svg viewBox="0 0 680 430" width="680" height="430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gGood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gBad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="gMatch" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="430" rx="12" fill="#1a1a2e"/>

  <!-- Step 1: original string with impurity split -->
  <text x="340" y="24" text-anchor="middle" fill="#e6e6f0" font-size="15" font-weight="bold">Step 1：遇到杂质就切段</text>

  <text x="40" y="54" fill="#8888aa" font-size="12" font-family="monospace">S =</text>

  <!-- impurity chars -->
  <text x="72" y="54" fill="#ef4444" font-size="13" font-weight="bold" font-family="monospace">i</text>
  <text x="86" y="54" fill="#ef4444" font-size="13" font-weight="bold" font-family="monospace">l</text>
  <text x="100" y="54" fill="#ef4444" font-size="13" font-weight="bold" font-family="monospace">o</text>
  <text x="114" y="54" fill="#ef4444" font-size="13" font-weight="bold" font-family="monospace">v</text>
  <text x="128" y="54" fill="#ef4444" font-size="13" font-weight="bold" font-family="monospace">e</text>

  <!-- clean chars -->
  <text x="142" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">s</text>
  <text x="156" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">y</text>
  <text x="170" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">s</text>
  <text x="184" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">u</text>
  <text x="198" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">s</text>
  <text x="212" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">y</text>
  <text x="226" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">s</text>
  <text x="240" y="54" fill="#10b981" font-size="14" font-weight="bold" font-family="monospace">u</text>

  <!-- impurity bracket -->
  <line x1="70" y1="62" x2="125" y2="62" stroke="#ef4444" stroke-width="1.5"/>
  <text x="98" y="76" text-anchor="middle" fill="#ef4444" font-size="10">杂质段，直接跳过</text>

  <!-- clean bracket -->
  <line x1="140" y1="62" x2="238" y2="62" stroke="#10b981" stroke-width="1.5"/>
  <text x="189" y="76" text-anchor="middle" fill="#10b981" font-size="10">纯 s/y/u 段，单独处理</text>

  <!-- Step 2: prefix scanning within clean segment -->
  <text x="340" y="108" text-anchor="middle" fill="#e6e6f0" font-size="15" font-weight="bold">Step 2：段内扫前缀，计算 (A, B) 状态</text>

  <rect x="30" y="118" width="620" height="190" rx="10" fill="#252540" stroke="#3d3d6e" stroke-width="1"/>
  <text x="340" y="140" text-anchor="middle" fill="#8888aa" font-size="11">定义：A = pref_s − 2·pref_y　　 B = pref_y − pref_u</text>

  <!-- header -->
  <text x="52" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">位置</text>
  <text x="120" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">字符</text>
  <text x="180" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">pref_s</text>
  <text x="240" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">pref_y</text>
  <text x="300" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">pref_u</text>
  <text x="360" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">A</text>
  <text x="420" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">B</text>
  <text x="480" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">哈希表计数</text>
  <text x="590" y="165" fill="#b0b0cc" font-size="11" font-weight="bold">贡献</text>

  <line x1="45" y1="172" x2="630" y2="172" stroke="#3d3d6e" stroke-width="1"/>

  <!-- data rows -->
  <text x="52" y="192" fill="#b0b0cc" font-size="12" font-family="monospace"> 0</text>
  <text x="120" y="192" fill="#b0b0cc" font-size="12" font-family="monospace">(起始)</text>
  <text x="180" y="192" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="240" y="192" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="300" y="192" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="345" y="192" fill="#a5b4fc" font-size="12" font-weight="bold" font-family="monospace">0</text>
  <text x="405" y="192" fill="#a5b4fc" font-size="12" font-weight="bold" font-family="monospace">0</text>
  <text x="490" y="192" fill="#6666aa" font-size="12" font-family="monospace">{(0,0): 1}</text>
  <text x="595" y="192" fill="#6666aa" font-size="12" font-family="monospace">--</text>

  <text x="52" y="214" fill="#b0b0cc" font-size="12" font-family="monospace"> 1</text>
  <text x="104" y="214" fill="#10b981" font-size="13" font-weight="bold" font-family="monospace">s</text>
  <text x="180" y="214" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="240" y="214" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="300" y="214" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="345" y="214" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="405" y="214" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="490" y="214" fill="#6666aa" font-size="12" font-family="monospace">{(0,0):1, (1,0):1}</text>
  <text x="595" y="214" fill="#6666aa" font-size="12" font-family="monospace">+0</text>

  <text x="52" y="236" fill="#b0b0cc" font-size="12" font-family="monospace"> 2</text>
  <text x="104" y="236" fill="#10b981" font-size="13" font-weight="bold" font-family="monospace">y</text>
  <text x="180" y="236" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="240" y="236" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="300" y="236" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="345" y="236" fill="#b0b0cc" font-size="12" font-family="monospace">-1</text>
  <text x="405" y="236" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="490" y="236" fill="#6666aa" font-size="12" font-family="monospace">{(0,0):1, (1,0):1, (-1,1):1}</text>
  <text x="595" y="236" fill="#6666aa" font-size="12" font-family="monospace">+0</text>

  <text x="52" y="258" fill="#b0b0cc" font-size="12" font-family="monospace"> 3</text>
  <text x="104" y="258" fill="#10b981" font-size="13" font-weight="bold" font-family="monospace">s</text>
  <text x="180" y="258" fill="#b0b0cc" font-size="12" font-family="monospace">2</text>
  <text x="240" y="258" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="300" y="258" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="345" y="258" fill="#b0b0cc" font-size="12" font-family="monospace">0</text>
  <text x="405" y="258" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="490" y="258" fill="#6666aa" font-size="12" font-family="monospace">{(0,0):1, (1,0):1, (−1,1):1, <tspan fill="#a5b4fc" font-weight="bold">(0,1)</tspan>:1}</text>
  <text x="595" y="258" fill="#6666aa" font-size="12" font-family="monospace">+0</text>

  <text x="52" y="280" fill="#b0b0cc" font-size="12" font-family="monospace"> 4</text>
  <text x="104" y="280" fill="#10b981" font-size="13" font-weight="bold" font-family="monospace">u</text>
  <text x="180" y="280" fill="#b0b0cc" font-size="12" font-family="monospace">2</text>
  <text x="240" y="280" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="300" y="280" fill="#b0b0cc" font-size="12" font-family="monospace">1</text>
  <text x="345" y="280" fill="#a5b4fc" font-size="12" font-weight="bold" font-family="monospace">0</text>
  <text x="405" y="280" fill="#a5b4fc" font-size="12" font-weight="bold" font-family="monospace">0</text>
  <text x="460" y="280" fill="#a5b4fc" font-size="12" font-weight="bold" font-family="monospace">mp.find((0,0)) = 1</text>
  <text x="595" y="280" fill="#10b981" font-size="12" font-weight="bold" font-family="monospace">+1 ←"sysu"</text>

  <!-- Step 3: explanation -->
  <rect x="30" y="320" width="620" height="100" rx="10" fill="#0d0d14"/>
  <text x="340" y="348" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="bold">为什么 (0,0) 在位置 0 和 4 各出现一次就是"发现了一个好子串"？</text>
  <text x="340" y="372" text-anchor="middle" fill="#8888aa" font-size="12">A 和 B 分别是两条比例约束的"偏差值"。位置 0 和 4 的偏差值相同</text>
  <text x="340" y="392" text-anchor="middle" fill="#8888aa" font-size="12">→ 说明 S[0..3] 这段子串内，count_s : count_y : count_u = 2 : 1 : 1</text>
  <text x="340" y="412" text-anchor="middle" fill="#8888aa" font-size="12">+ 段内无杂质 → 长度自动满足 4×count_y → 必然可以排成 k 个 "sysu"</text>
</svg>