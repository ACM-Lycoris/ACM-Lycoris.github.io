<svg viewBox="0 0 720 500" width="720" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="charBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="asciiBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="polyBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="hashBox" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="500" rx="12" fill="url(#bg)" stroke="#2d2d5e" stroke-width="1.5"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" fill="#e0e0f0" font-size="17" font-weight="bold">字符串哈希原理 — 把字符串看成一个 P 进制大数</text>

  <!-- ===== Step 1: String ===== -->
  <rect x="24" y="56" width="68" height="22" rx="4" fill="#6366f1" opacity="0.2"/>
  <text x="32" y="71" fill="#a5b4fc" font-size="12" font-weight="bold">Step 1</text>
  <text x="100" y="71" fill="#b0b0cc" font-size="13">字符串 — 每个字符对应一个位置下标</text>

  <!-- Character boxes -->
  <rect x="134" y="88" width="58" height="52" rx="8" fill="url(#charBox)"/>
  <text x="163" y="110" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">s</text>
  <text x="163" y="131" text-anchor="middle" fill="#c7d2fe" font-size="11">S[0]</text>

  <rect x="208" y="88" width="58" height="52" rx="8" fill="url(#charBox)"/>
  <text x="237" y="110" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">y</text>
  <text x="237" y="131" text-anchor="middle" fill="#c7d2fe" font-size="11">S[1]</text>

  <rect x="282" y="88" width="58" height="52" rx="8" fill="url(#charBox)"/>
  <text x="311" y="110" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">s</text>
  <text x="311" y="131" text-anchor="middle" fill="#c7d2fe" font-size="11">S[2]</text>

  <rect x="356" y="88" width="58" height="52" rx="8" fill="url(#charBox)"/>
  <text x="385" y="110" text-anchor="middle" fill="#fff" font-size="22" font-weight="bold">u</text>
  <text x="385" y="131" text-anchor="middle" fill="#c7d2fe" font-size="11">S[3]</text>

  <!-- Down arrows under character boxes -->
  <line x1="163" y1="142" x2="163" y2="162" stroke="#6666aa" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="237" y1="142" x2="237" y2="162" stroke="#6666aa" stroke-width="1.5"/>
  <line x1="311" y1="142" x2="311" y2="162" stroke="#6666aa" stroke-width="1.5"/>
  <line x1="385" y1="142" x2="385" y2="162" stroke="#6666aa" stroke-width="1.5"/>

  <defs>
    <marker id="arrowGray" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6666aa"/>
    </marker>
  </defs>

  <!-- ===== Step 2: ASCII values ===== -->
  <rect x="24" y="170" width="68" height="22" rx="4" fill="#f59e0b" opacity="0.2"/>
  <text x="32" y="185" fill="#fbbf24" font-size="12" font-weight="bold">Step 2</text>
  <text x="100" y="185" fill="#b0b0cc" font-size="13">映射为 ASCII 数值</text>

  <!-- ASCII value boxes -->
  <rect x="131" y="198" width="64" height="40" rx="8" fill="url(#asciiBox)"/>
  <text x="163" y="224" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">115</text>

  <rect x="205" y="198" width="64" height="40" rx="8" fill="url(#asciiBox)"/>
  <text x="237" y="224" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">121</text>

  <rect x="279" y="198" width="64" height="40" rx="8" fill="url(#asciiBox)"/>
  <text x="311" y="224" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">115</text>

  <rect x="353" y="198" width="64" height="40" rx="8" fill="url(#asciiBox)"/>
  <text x="385" y="224" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">117</text>

  <!-- Down arrows under ASCII boxes -->
  <line x1="163" y1="240" x2="163" y2="260" stroke="#6666aa" stroke-width="1.5"/>
  <line x1="237" y1="240" x2="237" y2="260" stroke="#6666aa" stroke-width="1.5"/>
  <line x1="311" y1="240" x2="311" y2="260" stroke="#6666aa" stroke-width="1.5"/>
  <line x1="385" y1="240" x2="385" y2="260" stroke="#6666aa" stroke-width="1.5"/>

  <!-- ===== Step 3: P-powers + Formula ===== -->
  <rect x="24" y="270" width="68" height="22" rx="4" fill="#a855f7" opacity="0.2"/>
  <text x="32" y="285" fill="#c084fc" font-size="12" font-weight="bold">Step 3</text>
  <text x="100" y="285" fill="#b0b0cc" font-size="13">乘上 P 的对应次幂，得到多项式</text>

  <!-- Formula box -->
  <rect x="36" y="302" width="648" height="54" rx="10" fill="#0f0f23" stroke="#3d3d6e" stroke-width="1"/>
  <text x="360" y="336" text-anchor="middle" fill="#e6e6f0" font-size="16">
    hash("sysu") = 115×P³ + 121×P² + 115×P¹ + 117×P⁰
  </text>

  <!-- ===== Mod M indicator ===== -->
  <line x1="360" y1="358" x2="360" y2="378" stroke="#6666aa" stroke-width="1.5"/>
  <rect x="280" y="376" width="160" height="26" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="360" y="394" text-anchor="middle" fill="#f87171" font-size="13">取模 M（大质数）压缩范围</text>

  <!-- Down arrow to result -->
  <line x1="360" y1="404" x2="360" y2="424" stroke="#6666aa" stroke-width="1.5"/>

  <!-- ===== Step 4: Hash Result ===== -->
  <rect x="24" y="430" width="68" height="22" rx="4" fill="#10b981" opacity="0.2"/>
  <text x="32" y="445" fill="#34d399" font-size="12" font-weight="bold">Step 4</text>
  <text x="100" y="445" fill="#b0b0cc" font-size="13">得到最终的哈希值（指纹），O(1) 比较字符串相等</text>

  <!-- Hash result box -->
  <rect x="140" y="458" width="440" height="34" rx="8" fill="url(#hashBox)" filter="url(#glow)"/>
  <text x="360" y="480" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">P=131, M=10⁹+7 → hash("sysu") = 260,622,128</text>
</svg>