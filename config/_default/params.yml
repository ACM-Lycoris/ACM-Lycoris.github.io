# ========== 主页大图 ==========
banner: "/images/back.png"

# ========== 自定义 CSS 注入 (主题不读 customCSS，必须用 injector 钩子) ==========
injector:
  head_end: |
    <link rel="stylesheet" href="/css/custom.css?v=cyber2026b">
    <script>
      // 在第一帧前确定主题，消除 FOUC
      (function() {
        try {
          if (localStorage.getItem('lyc_theme_v') !== 'cyber2026') {
            localStorage.setItem('dark_mode', 'true');
            localStorage.setItem('lyc_theme_v', 'cyber2026');
          }
          var mode = localStorage.getItem('dark_mode') || 'true';
          var isDark = mode === 'true' ||
                       (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch(e) {}
      })();
    </script>
  body_end: |
    <script src="/js/category-accordion.js" defer></script>

# ========== 站点信息 ==========
author: ACM-Lycoris
email: abcd1844314159@163.com
description: "振桴彼岸，绽蕊忘川"

# ========== 博客简介 (首页显示) ==========
blogIntroTitle: "关于本站"
blogIntro: "ACM / 算法竞赛笔记与题解。记录我的技术学习之路,梦想是开发彼岸美好的世界"

# ========== 副标题 (打字机循环) ==========
subtitle:
  typing:
    enable: true
    strings:
      - "振桴彼岸，绽蕊忘川"
      - "于无声处听惊雷"
      - "代码与诗，皆可入梦"
      - "Hack the planet · 落英缤纷"
      - "The answer is in the depth of five fathoms. Waiting to be retrieved."
      - "五浔深处的答案,静待拾遗."
      - "The answer is in the depth of five fathoms. And has always been her."
      - "静待拾遗的答案,本就是伊"
    typeSpeed: 90
    backSpeed: 40
    backDelay: 2000
    startDelay: 300
    loop: true
    shuffle: false
    showCursor: true
    cursorChar: "_"
    smartBackspace: false
  text: "振桴彼岸，绽蕊忘川"

# ========== 侧边栏小部件 ==========
