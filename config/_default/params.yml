# ========== 自定义字体 (霞鹜文楷 + JetBrains Mono) ==========
custom_font:
  enable: true
  article:
    - css: https://fontsapi.zeoseven.com/292/main/result.css
      name: "LXGW WenKai Screen"
  code:
    - css: https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap
      name: "JetBrains Mono"

font:
  enable: true
  article:
    - Mulish
    - Noto Serif SC
  code:
    - JetBrains Mono

local_font:
  article:
    - "-apple-system"
    - "PingFang SC"
    - "Microsoft YaHei"
    - "sans-serif"
  code:
    - "JetBrains Mono"
    - "Menlo"
    - "Monaco"
    - "Consolas"
    - "monospace"

